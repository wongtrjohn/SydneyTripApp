<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d5c" />
  <title>Sydney Trip App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦘</text></svg>" />
  <link rel="stylesheet" href="assets/styles.css" />

  <!-- React via CDN (no build step) + Babel to compile the JSX in app.js in-browser -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div class="boot">Loading Sydney Trip App…</div>
  </div>

  <!-- App config: change the sheet/tab or trip header here -->
  <script src="assets/config.js"></script>
  <!-- App logic (JSX, compiled by Babel at load time) -->
  <script type="text/babel" data-presets="react" src="assets/app.js"></script>
</body>
</html>
